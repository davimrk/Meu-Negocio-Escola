<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cardapio.css">
    <link rel="stylesheet" href="header.css">
     <link
      href="https://fonts.googleapis.com/css2?family=Baloo+Chettan+2&family=Carter+One&family=Luckiest+Guy&family=Poppins&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
</head>
<body>
   
<header>
  <h1>Cardápio</h1>
  <img src="img/escolalogo.png" id="logo"/>
</header>
<br>
<main>
    <section class="fundo-cardapio">
        <div class="form-cardapio">
            <h2>Adicionar Produto</h2>
            <form id="formProduto">
 
                <label>Nome do Produto</label>
                <input type="text" id="nome">
 
                <label>Tipo</label>
                <select id="tipo">
                    <option>Salgado</option>
                    <option>Doce</option>
                    <option>Bebida</option>
                </select>
             
                <label>Preço</label>
 
                <input type="number" id="preco" step="0.01">
 
                <button type="submit">
                    Adicionar Produto
                </button>
 
            </form>
        </div>
        <div id="listaProdutos"></div>
 
    </section>
</main>
<script src="addCardapio.js"></script>
 
</body>
</html>
